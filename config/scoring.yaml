# Verdad-Style Leveraged Small Value Scoring Model
# Based on Rasmussen's PE replication thesis:
#   leverage + size + value = PE outperformance in public markets
# Adapted for Japan equities with governance reform tailwinds

model:
  name: "japan_leveraged_small_value_v2"
  version: "2.0"
  framework: "verdad"

# ── PRIMARY SCREEN ──────────────────────────────────────────
# These are hard gates. A stock must pass all three to enter the universe.
# Matches Verdad's core thesis: small, leveraged, cheap.
primary_screen:
  # Small size: 25th–75th percentile market cap
  # For Japan, roughly 30B–300B JPY (~$200M–$2B USD)
  market_cap_min_jpy: 30_000_000_000
  market_cap_max_jpy: 300_000_000_000
  # Leverage: above-median LT debt/EV (>0.15 for Japan)
  lt_debt_to_ev_min: 0.10
  # Cheap: EV/EBITDA < 8x (Verdad targets 7–8x for best PE deals)
  ev_to_ebitda_max: 8.0
  # Net debt/EBITDA 3–4x (leveraged but not distressed)
  net_debt_to_ebitda_max: 5.0

# ── BANKRUPTCY SCREENS ──────────────────────────────────────
# Hard exclusion filters to avoid distress/value traps.
# Verdad screens for profitable, cash-flow generative, not heavily shorted.
bankruptcy_screen:
  require_profitable: true          # net income > 0
  require_positive_fcf: true        # free cashflow > 0
  require_positive_ocf: true        # operating cashflow > 0
  max_short_pct_float: 0.10         # skip if >10% short interest
  max_short_ratio: 8.0              # skip if >8 days to cover

# ── GROUP WEIGHTS ───────────────────────────────────────────
# How much each scoring category contributes to composite.
# Verdad overweights value/leverage; momentum is secondary.
group_weights:
  leverage_value: 0.35              # Core Verdad: cheap + leveraged
  deleveraging: 0.25                # The flywheel: debt paydown drives returns
  quality_efficiency: 0.25          # Capital efficiency, profitability
  momentum: 0.15                    # Avoid falling knives

# ── LEVERAGE & VALUE ────────────────────────────────────────
# Core Verdad metrics: the cheaper and more leveraged, the better
# (within the bankruptcy-screened universe).
leverage_value:
  weights:
    ebitda_to_ev: 0.30              # Primary: earnings yield on enterprise
    ev_to_ebitda: 0.25              # Lower = cheaper (inverted)
    lt_debt_to_ev: 0.20             # Higher leverage = more equity upside
    price_to_book: 0.15             # Japan P/B still matters
    net_debt_to_ebitda: 0.10        # Leverage depth (inverted — lower is safer)

# ── DELEVERAGING ────────────────────────────────────────────
# Verdad's secondary factors: debt paydown is #1 predictor of returns.
# "The ideal leveraged stock is paying down debt."
deleveraging:
  weights:
    debt_paydown: 0.35              # LT debt declining YoY (binary/magnitude)
    asset_turnover: 0.25            # Improving asset turnover
    asset_growth: 0.20              # Growing asset base
    market_cap_rank: 0.10           # Smaller within range = better
    gross_profit_to_assets: 0.10    # Capital efficiency (Novy-Marx factor)

# ── QUALITY & EFFICIENCY ────────────────────────────────────
# Profitability and balance sheet quality within the leveraged universe.
quality_efficiency:
  weights:
    gross_profit_to_assets: 0.30    # Verdad's preferred quality metric
    operating_margin: 0.20
    roe: 0.20
    lt_debt_to_assets: 0.15         # Low-to-moderate is ideal (inverted)
    current_ratio: 0.15

# ── MOMENTUM ────────────────────────────────────────────────
# Avoid catching falling knives. Light weight.
momentum:
  weights:
    relative_strength_6m: 0.40
    price_vs_52w_high: 0.30
    sma_50_vs_200: 0.30

# ── COMPOSITE ───────────────────────────────────────────────
scoring:
  min_composite_score: 0.55         # Lower threshold — leveraged stocks are riskier
  top_n: 30
  rebalance_frequency: "quarterly"

# ── VERDAD REFERENCE THRESHOLDS ─────────────────────────────
# Not used in scoring directly, but useful for dashboard display
# and screening preset calibration.
reference:
  pe_deal_avg_mcap_usd: 180_000_000
  pe_ev_ebitda_target: 7.0
  pe_net_debt_ebitda_target: 3.5
  japan_governance_reform: true
  cross_shareholding_unwind: true
